<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header class="header">
<h1>FocusHub</h1>

    </header>
    <div class="layout">
    <aside class="sidebar"> 
        <div class="logo">
            <img src="assets/c091068a-8f9d-4ba6-a585-a3e6d6898ce0.jpg" alt="FocusHub Logo">
            <h2 >FocusHub</h2>
            <p>StayFocused,Achive.</p>
        </div>
        <nav>
     <ul>
        <li><a href="#study-tasks">study tasks</a></li>
        <li><a href="#todo-list">To-do list</a></li>
        <li><a href="#timer">timer</a></li>
        <li><a href="#goal-reminder">goal reminder</a></li>
        <li><a href="#notes">notes</a></li>
     </ul>
    </nav></aside>
    <main class="main">
        <div class="grid">
<section class="study-tasks" ><b class="pseudo-element">study tasks</b><br><br>
    <form>
        <label class="label">subject : <input></label><br><br>
        <label>Task     : <input></label><br><br>
        <label>Time    : <input></label><br><br>
        <label>status : <select><option>done</option><option>not yet</option></select></label><br><br>
               <div class="add-task">  <button class="button" type="submit">add task</button></div><br><br>
            </form>
        </section>
    </form>

</section>
<section class="study-tasks"><b>to-do-list<br><br></b>
     <form>
       <label>Task: <input></label><br><br>
        <label>Deadline   : <input></label><br><br>
        <label>Time    : <input></label><br><br>
        <label>priority : <select><option>task 1</option><option>task 2</option></select></label><br><br>
               <div class="add-task"> <button class="button" type="submit">add task</button></div><br><br>
            </form>
</section>
<section class="study-tasks"><b>timer</b><br><br> <form>
       <label><h3>25:00</h3></label><br><br>
        <!-- <label>Deadline   : <input></label><br><br>
        <label>Time    : <input></label><br><br>
        <label>priority : <select><option>task 1</option><option>task 2</option></select></label><br><br> -->
               <div class="start"> <button class="button" type="submit">add task</button></div><br>
               <div class="pause"> <button class="button" type="submit">add task</button></div><br>
               <div class="reset"> <button class="button" type="submit">add task</button></div><br>
               </form></section>
<section class="study-tasks"><b>goal reminder</b><br><br><form>
        <label>goal: <input></label><br><br>
        <label>Deadline    : <input type="datetime"></label><br><br>
        <!-- <label>Time    : <input></label><br><br> -->
        <label>priority : <select><option>done</option><option>not yet</option></select></label><br><br>
               <div class="add-task">  <button class="button" type="submit">Save goal</button></div><br><br>
            </form></section>
<section class="study-tasks"><div class="notes"><b>notes</b><br><br>  <form>
       <!-- <label>Task: <input></label><br><br> -->
        
        <!-- <label>Deadline   : <input></label><br><br>
        <label>Time    : <input></label><br><br>
        <label>priority : <select><option>task 1</option><option>task 2</option></select></label><br><br> -->
        <textarea id="notes" placeholder="Write your notes here..."></textarea>
        <div class="add-task"> <button type="submit">Save note</button></div><br>
                <div class="add-task"> <button class="button" type="submit">clear</button></div>
            </form></div></section>

        </div>
   </main>
    </div>
    <footer>
<p>&copy:2026 FocusHub</p>
    </footer>
</html>
